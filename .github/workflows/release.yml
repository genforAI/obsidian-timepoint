name: Release

on:
  push:
    tags: ["*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run release:validate -- "${GITHUB_REF_NAME}"
      - name: Publish exact Obsidian runtime assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          flags=()
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then flags+=(--prerelease); fi
          gh release create "${GITHUB_REF_NAME}" \
            manifest.json main.js styles.css \
            --verify-tag --generate-notes --title "TimePoint ${GITHUB_REF_NAME}" "${flags[@]}"
