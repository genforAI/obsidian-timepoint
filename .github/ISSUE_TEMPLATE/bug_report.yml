name: Bug report
description: Report a reproducible TimePoint problem without including private note content.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Before posting, replace personal note text and paths with a minimal safe example.
  - type: input
    id: version
    attributes:
      label: TimePoint version
      placeholder: 0.8.0-beta.1
    validations:
      required: true
  - type: input
    id: obsidian
    attributes:
      label: Obsidian and operating system
      placeholder: Obsidian 1.x, macOS 15 / Windows 11
    validations:
      required: true
  - type: dropdown
    id: appearance
    attributes:
      label: Appearance mode
      options: [Native, Signature]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include the theme, window width, and export format when relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private note contents, usernames, and local paths from this report.
          required: true
